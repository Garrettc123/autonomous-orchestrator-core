version: "3.9"

services:
  orchestrator:
    build: .
    container_name: autonomous-orchestrator
    environment:
      - COMMANDER_ONE_KEY=${COMMANDER_ONE_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - LINEAR_API_KEY=${LINEAR_API_KEY:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - NOTION_TOKEN=${NOTION_TOKEN:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - NODE_REGISTRY_PATH=${NODE_REGISTRY_PATH:-configs/node_registry.yaml}
    volumes:
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
    restart: unless-stopped
    command: python orchestrator.py

  ecosystem:
    build: .
    container_name: autonomous-ecosystem
    environment:
      - COMMANDER_ONE_KEY=${COMMANDER_ONE_KEY:-ecosystem_default}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    command: python run_all_systems.py

  # ── RHNS: Local Inference (Ollama) ──────────────────────────────
  # Optional sidecar for on-device / local inference via Ollama.
  # Pulls the lightweight qwen2.5:0.5b model on first start.
  # To enable, set RHNS_PIXEL_STATUS=active in the orchestrator env.
  ollama:
    image: ollama/ollama:latest
    container_name: rhns-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # Pull the default RHNS model after Ollama starts.
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull qwen2.5:0.5b && wait"]

volumes:
  ollama_models:
