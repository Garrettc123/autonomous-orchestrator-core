name: Max Out All Repos

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you running this?'
        required: false
        default: 'Manual repo optimization'

jobs:
  max-repos:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyGithub

      - name: Run max-out script
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "ERROR: GH_PAT secret is not configured."
            echo "Add it at: https://github.com/Garrettc123/autonomous-orchestrator-core/settings/secrets/actions"
            exit 1
          fi
          cat << 'PYEOF' > max_repos.py
          import os, time, requests
          from github import Github, GithubException

          PAT = os.environ['GH_PAT']
          g = Github(PAT)
          user = g.get_user()
          username = user.login
          print(f'Authenticated as: {username}')

          headers = {'Authorization': f'token {PAT}', 'Accept': 'application/vnd.github.v3+json'}

          def api(method, path, **kwargs):
              url = f'https://api.github.com{path}'
              r = getattr(requests, method)(url, headers=headers, **kwargs)
              time.sleep(0.3)
              return r

          repos = []
          page = 1
          while True:
              r = api('get', f'/user/repos?per_page=100&page={page}&affiliation=owner')
              data = r.json()
              if not data: break
              repos.extend(data)
              page += 1

          print(f'Total repos: {len(repos)}')
          print('Processing complete.')
          PYEOF
          python max_repos.py
