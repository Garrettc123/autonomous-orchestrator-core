name: Pixel 10 Qwen Health Check

# Scheduled health-check that polls the Pixel 10 on-device Ollama endpoint.
# DISABLED BY DEFAULT — remove `if: false` or set the activation gate
# once the Pixel node and Qwen model are confirmed live.

on:
  schedule:
    # Every 5 minutes (matches config polling.interval_seconds: 300).
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_run:
        description: "Run even if activation gate is not set"
        required: false
        default: "false"

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    # Primary gate: flip to `true` or remove this line when the Pixel
    # node is live. The Python module has its own activation gate too.
    if: false

    permissions:
      contents: read

    env:
      # Override with the real Pixel 10 Ollama URL in repo secrets.
      PIXEL_OLLAMA_URL: ${{ secrets.PIXEL_OLLAMA_URL }}
      # Activation gate — set this secret to "1" to enable.
      PIXEL_HEALTHCHECK_ENABLED: ${{ secrets.PIXEL_HEALTHCHECK_ENABLED }}
      # Slack webhook URL for posting health reports.
      # Create an Incoming Webhook at https://api.slack.com/messaging/webhooks
      # and store the URL as this repo secret.
      SLACK_HEALTHCHECK_WEBHOOK_URL: ${{ secrets.SLACK_HEALTHCHECK_WEBHOOK_URL }}
      # Fallback: existing Slack Bot Token (if webhook not configured).
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run health check
        run: |
          python -c "
          import json
          from modules.pixel_healthcheck import load_config, is_enabled, run_healthcheck, build_slack_payload, post_to_slack

          config = load_config()

          # In workflow_dispatch with force_run, bypass activation gate.
          force = '${{ github.event.inputs.force_run }}' == 'true'
          if not force and not is_enabled(config):
              print('[pixel-healthcheck] Not enabled. Exiting.')
              exit(0)

          result = run_healthcheck(config)
          print(json.dumps(result, indent=2))

          payload = build_slack_payload(
              config,
              result['endpoint'],
              result['latency'],
              result['memory'],
          )
          posted = post_to_slack(config, payload)
          print(f'Slack posted: {posted}')

          # Fail the workflow if the endpoint is down.
          if not result['endpoint']['ok']:
              print('::error::Pixel 10 Ollama endpoint is unreachable')
              exit(1)
          "
