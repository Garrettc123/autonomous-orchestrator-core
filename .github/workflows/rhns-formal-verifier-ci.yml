name: RHNS Formal Verifier — CI

on:
  push:
    paths: ["core/formal_verifier.py", "core/standards_gate.py", "tests/test_formal_verifier.py"]
  workflow_dispatch:

jobs:
  test-formal-verifier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov pytest-asyncio requests
      - run: pytest tests/test_formal_verifier.py -v --override-ini="addopts=" --cov=core.formal_verifier --cov-report=term-missing --cov-fail-under=85
      - name: Summary
        run: echo "## RHNS Formal Verifier CI ✅ Lean4-inspired proof engine tests passed" >> $GITHUB_STEP_SUMMARY
