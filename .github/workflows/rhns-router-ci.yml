name: RHNS Inference Router — CI

on:
  push:
    paths: ["modules/inference_router.py", "tests/test_inference_router.py"]
  workflow_dispatch:

jobs:
  test-inference-router:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov pytest-asyncio requests pyyaml
      - run: pytest tests/test_inference_router.py -v --override-ini="addopts=" --cov=modules.inference_router --cov-report=term-missing --cov-fail-under=85
      - name: Summary
        run: echo "## RHNS Inference Router CI ✅" >> $GITHUB_STEP_SUMMARY
